name: 山西东风南方天气预警
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  weather-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests lxml pytz
      - run: python alert.py
