name: 山西东风南方天气预警
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  weather-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 恢复缓存（使用固定 key）
      - name: 恢复缓存
        uses: actions/cache@v4
        with:
          path: |
            forecast_sent_date.txt
            alert_cache.json
          key: weather-cache-v1

      - run: pip install requests lxml pytz
      - run: python alert.py

      # 保存缓存（使用相同的固定 key）
      - name: 保存缓存
        uses: actions/cache@v4
        with:
          path: |
            forecast_sent_date.txt
            alert_cache.json
          key: weather-cache-v1
