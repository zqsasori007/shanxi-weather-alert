name: 山西东风南方天气预警
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  weather-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 明确授予写权限
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install requests lxml pytz

      - name: 运行天气脚本
        run: python alert.py

      - name: 提交缓存文件到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add forecast_sent_date.txt alert_cache.json
          git diff --staged --quiet || git commit -m "更新缓存文件 [skip ci]"
          # 使用 GITHUB_TOKEN 进行认证
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push
